# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Replace YOUR_GITHUB_USERNAME/MP3-Website with your real owner/repo.
# After deploying the OAuth worker, set base_url to that worker URL (see ADMIN.md).
backend:
  name: github
  repo: Tyraxiss/MP3-Website
  branch: main
  # base_url: https://YOUR-WORKER.workers.dev

# media_folder = path in the repo; public_folder = URL path written into catalog.json
# Must start with / for Sveltia. Include the GitHub Pages project name.
media_folder: Albums
public_folder: /MP3-Website/Albums

local_backend: true

collections:
  - name: catalog
    label: Music Catalog
    files:
      - name: catalog
        label: Albums & Tracks
        file: data/catalog.json
        fields:
          - label: Albums
            name: albums
            widget: list
            summary: "{{title}} — {{artist}}"
            fields:
              - { label: ID, name: id, widget: string, hint: "URL-safe slug, e.g. broken-thoughts" }
              - { label: Title, name: title, widget: string }
              - { label: Artist, name: artist, widget: string }
              - { label: Year, name: year, widget: number, value_type: int, required: false }
              - { label: Cover art, name: cover, widget: image }
              - label: Tracks
                name: tracks
                widget: list
                summary: "{{title}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Duration (seconds), name: duration, widget: number, value_type: int, required: false }
                  - { label: Audio file, name: src, widget: file }
                  - label: Lyrics file (.lrc / .vtt)
                    name: lyricsFile
                    widget: file
                    required: false
                    media_folder: Albums/lyrics
                    public_folder: /MP3-Website/Albums/lyrics
                    hint: Upload a premade .lrc or .vtt file. Takes priority over the text box below.
                  - label: Lyrics text
                    name: lyrics
                    widget: text
                    required: false
                    hint: >
                      Or paste lyrics here (one line per lyric line).
                      Optional timestamps: [0:12] Hello  or  [12.5] Hello  or  12.5 | Hello.
                      Ignored when a lyrics file is set.
