<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brian J. Smith</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("bs-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>

    <div id="app" class="app-shell">
      <header class="topbar">
        <a class="brand" href="#/" id="nav-home" data-nav="home">
          <span class="brand-name">Brian J. Smith</span>
          <span class="brand-sub">Albums</span>
        </a>

        <nav class="album-rail" aria-label="Albums">
          <div id="album-nav" class="album-nav"></div>
        </nav>

        <div class="topbar-actions">
          <button
            type="button"
            class="theme-toggle"
            id="btn-theme"
            title="Toggle light/dark mode"
            aria-label="Toggle light/dark mode"
          >
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M16.5 2.2A9.8 9.8 0 0 0 12 1a10 10 0 1 0 10 10c0-1.1-.2-2.2-.5-3.2A7.5 7.5 0 0 1 16.5 2.2Z"
              />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 6.5a5.5 5.5 0 1 0 5.5 5.5A5.5 5.5 0 0 0 12 6.5ZM11 1h2v3h-2V1Zm0 19h2v3h-2v-3ZM1 11h3v2H1v-2Zm19 0h3v2h-3v-2ZM4.2 3.8l2.1 2.1-1.4 1.4-2.1-2.1 1.4-1.4Zm14.9 14.9 2.1 2.1-1.4 1.4-2.1-2.1 1.4-1.4ZM18.1 5.9l2.1-2.1 1.4 1.4-2.1 2.1-1.4-1.4ZM3.8 19.8l2.1-2.1 1.4 1.4-2.1 2.1-1.4-1.4Z"
              />
            </svg>
          </button>
          <a class="admin-link" href="./admin/">Library</a>
        </div>
      </header>

      <div class="content-row">
        <main class="main-panel" id="main-view" tabindex="-1">
          <div id="view-root"></div>
        </main>

        <aside
          id="lyrics-panel"
          class="lyrics-panel"
          hidden
          aria-label="Lyrics"
          aria-labelledby="lyrics-heading"
        >
          <div class="lyrics-top">
            <div>
              <p id="lyrics-heading" class="lyrics-heading">Lyrics</p>
              <p id="lyrics-sub" class="lyrics-sub"></p>
            </div>
            <button type="button" class="ctrl ctrl-text" data-close-lyrics>Close</button>
          </div>
          <div id="lyrics-lines" class="lyrics-lines"></div>
        </aside>
      </div>

      <footer class="player-bar" aria-label="Now playing">
        <div class="player-track">
          <img id="np-art" class="np-art" src="" alt="" width="48" height="48" hidden />
          <div class="np-art-fallback" id="np-art-fallback" aria-hidden="true"></div>
          <div class="np-meta">
            <p id="np-title" class="np-title">Nothing playing</p>
            <p id="np-artist" class="np-artist">Choose a song to begin</p>
          </div>
        </div>

        <div class="player-center">
          <div class="transport">
            <button type="button" class="ctrl" id="btn-shuffle" title="Shuffle" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M14.5 3h3.7l-3.2 3.2 1.4 1.4L19.6 5.4V9h2V3h-6.1ZM4.2 4.8 3 6l5.4 5.4L14 5.8l-1.4-1.4L8.4 8.6 4.2 4.8Zm9.9 8.1-1.4 1.4 3.8 3.8H13v2h6.6v-6.1h-2v3.2l-3.5-3.3ZM3 18l1.2 1.2 4.2-4.2-1.4-1.4L3 18Z"
                />
              </svg>
            </button>
            <button type="button" class="ctrl" id="btn-prev" title="Previous">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M6 6h2v12H6V6Zm3.5 6 8.5 6V6l-8.5 6Z" />
              </svg>
            </button>
            <button type="button" class="ctrl ctrl-play" id="btn-play" title="Play">
              <svg id="icon-play" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M8 5v14l11-7L8 5Z" />
              </svg>
              <svg id="icon-pause" viewBox="0 0 24 24" aria-hidden="true" hidden>
                <path fill="currentColor" d="M6 5h4v14H6V5Zm8 0h4v14h-4V5Z" />
              </svg>
            </button>
            <button type="button" class="ctrl" id="btn-next" title="Next">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M16 6h2v12h-2V6ZM6 18l8.5-6L6 6v12Z" />
              </svg>
            </button>
            <button type="button" class="ctrl" id="btn-repeat" title="Repeat" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M7 7h10v3l4-4-4-4v3H5v6h2V7Zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4Z"
                />
              </svg>
            </button>
          </div>
          <div class="timeline">
            <span id="time-elapsed">0:00</span>
            <input id="seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek" />
            <span id="time-duration">0:00</span>
          </div>
        </div>

        <div class="player-right">
          <button type="button" class="ctrl ctrl-text" id="btn-lyrics" title="Lyrics" aria-pressed="false">
            Lyrics
          </button>
          <div class="volume">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M3 10v4h3l4 4V6L6 10H3Zm13.5 2a3.5 3.5 0 0 0-1.8-3.1v6.2A3.5 3.5 0 0 0 16.5 12Zm0-7.2v1.6a7 7 0 0 1 0 11.2v1.6a8.6 8.6 0 0 0 0-14.4Z"
              />
            </svg>
            <input
              id="volume"
              type="range"
              min="0"
              max="1"
              value="0.85"
              step="0.01"
              aria-label="Volume"
            />
          </div>
        </div>
      </footer>
    </div>

    <script src="./js/app.js" type="module"></script>
  </body>
</html>
